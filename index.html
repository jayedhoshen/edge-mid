<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
          <a class="navbar-brand fs-4 text-primary">Student App</a>
          <div>
            <a class="btn btn-outline-primary me-2" href="./index.html"
              >ADD Student</a
            >
            <a class="btn btn-outline-primary" href="./view2.html"
              >VIEW Student</a
            >
          </div>
        </div>
      </nav>
    </header>
    <main>
      <section class="container mt-5">
        <div class="card shadow p-4 rounded-4">
          <h2 class="mb-4">Add Student</h2>
          <div id="msg"></div>
          <form id="studentFrom">
            <input
              type="text"
              id="key"
              class="form-control mb-3"
              placeholder="Storage Key (e.g. cse101)"
              required
            />
            <input
              type="text"
              id="id"
              class="form-control mb-3"
              placeholder="Student ID"
              required
            />
            <input
              type="text"
              id="name"
              class="form-control mb-3"
              placeholder="Student name"
              required
            />
            <input
              type="email"
              id="email"
              class="form-control mb-3"
              placeholder="Email"
              required
            />
            <input
              type="text"
              id="phone"
              class="form-control mb-3"
              placeholder="Phone"
              required
            />
            <input
              type="text"
              id="course"
              class="form-control mb-3"
              placeholder="Course"
              required
            />
            <button class="btn btn-primary w-100">Add Student</button>
          </form>
        </div>
      </section>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
