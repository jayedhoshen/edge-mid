<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
          <a class="navbar-brand fs-4 text-primary">Student App</a>
          <div>
            <a class="btn btn-outline-primary me-2" href="./index.html"
              >ADD Student</a
            >
            <a class="btn btn-outline-primary" href="./view2.html"
              >VIEW Student</a
            >
          </div>
        </div>
      </nav>
    </header>
    <main>
      <section class="container mt-5">
        <h2 class="mb-3">View Students</h2>
        <input
          onclick="loadStudents()"
          type="text"
          id="viewKey"
          class="from-control mb-3"
          placeholder="Storage Key"
        />
        <button class="btn btn-success mb-3">Load</button>

        <div class="table-responsive">
          <table class="table table-striped table-hover">
            <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>

        <div id="pagination" class="mt-3"></div>
      </section>
      <section>
        <!-- Modal -->
        <div class="modal fade" id="editModal">
          <div class="modal-dialog">
            <div class="modal-content p-3">
              <h4>Edit Student</h4>
              <input id="editName" class="form-control mb-2" />
              <input id="editEmail" class="form-control mb-2" />
              <button onclick="saveEdit()" class="btn btn-primary">Save</button>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
