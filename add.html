<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add Student</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">Student App</a>
        <div>
          <a class="btn btn-outline-light me-2" href="add.html">Add</a>
          <a class="btn btn-outline-light" href="view.html">View</a>
        </div>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="card shadow p-4">
        <h3 class="mb-3">Add Student</h3>

        <div id="msg"></div>

        <form id="studentForm">
          <input
            type="text"
            id="key"
            class="form-control mb-2"
            placeholder="Storage Key (e.g. cse101)"
            required
          />

          <input
            type="text"
            id="id"
            class="form-control mb-2"
            placeholder="Student ID"
            required
          />

          <input
            type="text"
            id="name"
            class="form-control mb-2"
            placeholder="Name"
            required
          />

          <input
            type="email"
            id="email"
            class="form-control mb-2"
            placeholder="Email"
            required
          />

          <input
            type="text"
            id="phone"
            class="form-control mb-2"
            placeholder="Phone"
            required
          />

          <input
            type="text"
            id="course"
            class="form-control mb-2"
            placeholder="Course"
            required
          />

          <button class="btn btn-primary w-100">Add Student</button>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
