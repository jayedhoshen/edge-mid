<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>View Students</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">Student App</a>
        <div>
          <a class="btn btn-outline-light me-2" href="add.html">Add</a>
          <a class="btn btn-outline-light" href="view.html">View</a>
        </div>
      </div>
    </nav>

    <div class="container mt-5">
      <h2 class="mb-3">Students</h2>

      <input id="viewKey" class="form-control mb-2" placeholder="Storage Key" />
      <button onclick="loadStudents()" class="btn btn-success mb-3">
        Load
      </button>

      <input
        id="search"
        onkeyup="searchStudent()"
        class="form-control mb-3"
        placeholder="Search by name"
      />

      <div class="table-responsive">
        <table class="table table-bordered table-hover">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div id="pagination" class="mt-3"></div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="editModal">
      <div class="modal-dialog">
        <div class="modal-content p-3">
          <h4>Edit Student</h4>
          <input id="editName" class="form-control mb-2" />
          <input id="editEmail" class="form-control mb-2" />
          <button onclick="saveEdit()" class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
